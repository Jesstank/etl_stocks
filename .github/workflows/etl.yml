name: Run ETL Pipeline

on:
  workflow_dispatch:

  push:
    branches:
      - main

  schedule:
    - cron: "30 13 * * *"

jobs:
  run-etl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ETL pipeline
        run: python scripts/main.py

      - name: Validate SQLite database
        run: python scripts/check_db.py

      - name: Generate analysis reports
        run: python scripts/analyze_db.py

      - name: Upload ETL outputs
        uses: actions/upload-artifact@v4
        with:
          name: etl-output
          path: |
            data/etl_stocks.db
            data/processed/
            reports/